        </div>

    <div class="explanation">
        <h1>WHAT IS AOTD????</h1>
        <p>Marcie has been listening to an album for every day of 2026</p>
        <p>in the beninging it was all getting dumped on instagram</p>
        <p>unfortunately, that's a pain to update</p>
        <p>so now there's this page</p>

    <div class="sidebar">
        <!-- populated by the script -->
        <h1>test</h1>
        <!-- example div:
        <div class="albumSide">
            <h1>2026-01-01</h1>
            <img>
        </div>
        -->
    </div>

    <div class="content">
        <!-- populated by the script -->
        <h1>test</h1>
        <!-- example div:
        <div class="albumSide">
            <h1>2026-01-01</h1>
            <img>
        </div>
        -->
    </div>

    <script>
        // "Let's get this shit ay!" - Bejalvin
        // Anyways load up the AOTD CSV
        
        var csvPath = "assets/aotd/aotd.csv";
        var albumArray;
        $.get(csvPath, function(data) {
            albumArray = $.csv.toObjects(data);
            loadItUp(albumArray)
        });

        function loadItUp(csvArray) {
            csvArray.forEach(element => {
                var miniTableDiv = constructMiniDiv(element)
                $('.sidebar').prepend(miniTableDiv);  
                var bigContentDiv = constructBigDiv(element)
                console.log(bigContentDiv)
                $('.content').prepend(bigContentDiv);    
  
            });
        }

        function constructMiniDiv(albumObject) {
            console.log(albumObject)
            return `
            <a href="#${albumObject.date}"><div class="albumSide">
                <h1>${albumObject.date}</h1>
                <img source="assets/aotd/covers/${albumObject.date}.avif" alt="${albumObject.title}">
            </div></a>
            `;
        }
        function constructBigDiv(albumObject) {
            return `
            <div class="album Main" id="${albumObject.date}">
                <p>${albumObject.date} -</p><h1>${albumObject.title}</h1>
                <img source="assets/aotd/covers/${albumObject.date}.avif" alt="${albumObject.title}">
                <p>By ${albumObject.artist}</p>
            </div>

            `;
        }
    </script>


</body>
